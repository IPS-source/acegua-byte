<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 0 0 110px; }
        .header { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid #00d4ff; position: sticky; top: 0; z-index: 10; }
        .header h1 { color: #00d4ff; font-size: 22px; }
        .header p { color: #666; font-size: 13px; margin-top: 4px; }
        .container { max-width: 480px; margin: 0 auto; padding: 15px; }
        .categoria { font-size: 16px; font-weight: bold; color: #00d4ff; margin: 25px 0 12px; padding-left: 5px; display: flex; align-items: center; gap: 8px; }
        .categoria::after { content: ''; flex: 1; height: 1px; background: #222; }
        .card { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
        .card:hover { border-color: #00d4ff; }
        .card-info h3 { font-size: 15px; color: #fff; margin-bottom: 4px; }
        .card-info .preco { color: #00d4ff; font-weight: bold; font-size: 17px; }
        .card-info .desc { color: #777; font-size: 12px; margin-top: 2px; }
        .btn-add { background: #00d4ff; color: #000; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s; }
        .btn-add:active { background: #00a0cc; transform: scale(0.9); }
        .carrinho-section { max-width: 480px; margin: 0 auto; padding: 0 15px; }
        .carrinho-section h2 { text-align: center; margin: 20px 0 10px; color: #fff; font-size: 16px; }
        .item-carrinho { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 12px 15px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: 14px; align-items: center; }
        .item-carrinho .remover { color: #e74c3c; background: none; border: none; font-size: 18px; cursor: pointer; padding: 0 0 0 10px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #00d4ff; padding: 15px 20px; z-index: 10; }
        .footer-inner { max-width: 480px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .footer-total { font-size: 14px; color: #888; }
        .footer-total span { color: #00d4ff; font-size: 20px; font-weight: bold; }
        .btn-finalizar { background: #00d4ff; color: #000; border: none; padding: 14px 24px; border-radius: 30px; font-weight: bold; font-size: 14px; cursor: pointer; white-space: nowrap; transition: background 0.2s, transform 0.1s; }
        .btn-finalizar:active:not(:disabled) { background: #00a0cc; transform: scale(0.97); }
        .btn-finalizar:disabled { background: #333; color: #666; cursor: not-allowed; }
        .confirmacao { display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        .confirmacao-box { background: #141414; border: 1px solid #00d4ff; border-radius: 16px; padding: 40px 30px; max-width: 360px; width: 100%; }
        .confirmacao-box .icon { font-size: 48px; margin-bottom: 15px; }
        .confirmacao-box h1 { color: #00d4ff; margin-bottom: 10px; font-size: 22px; }
        .confirmacao-box p { color: #888; margin-bottom: 8px; font-size: 14px; }
        .confirmacao-box button { background: #00d4ff; color: #000; border: none; padding: 14px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 20px; transition: background 0.2s; }
        .confirmacao-box button:hover { background: #00a0cc; }
        .badge-added { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #00d4ff; color: #000; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 20; }
        .badge-added.show { opacity: 1; }
        .loading { text-align: center; padding: 60px 20px; color: #555; }
        .loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #222; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-card { text-align: center; padding: 60px 20px; }
        .error-card .icon { font-size: 48px; margin-bottom: 10px; }
        .error-card p { color: #888; }
    </style>
</head>
<body>
    <div class="header" id="header">
        <h1 id="rest-title">⚡ Cardápio</h1>
        <p id="rest-subtitle">Faça seu pedido pelo WhatsApp</p>
    </div>
    <div class="container" id="menu-container">
        <div class="loading">
            <div class="spinner"></div>
            <p>Carregando cardápio...</p>
        </div>
    </div>
    <div class="carrinho-section" id="carrinho-section" style="display:none;">
        <h2>🛒 Seu Carrinho</h2>
        <div id="carrinho-items"></div>
    </div>
    <div class="footer" id="footer">
        <div class="footer-inner">
            <div class="footer-total">Total<br><span>R$ <span id="total">0,00</span></span></div>
            <button class="btn-finalizar" id="btn-finalizar" onclick="checkout()" disabled>📲 Enviar Pedido</button>
        </div>
    </div>
    <div class="badge-added" id="badge">✓ Adicionado</div>
    <script>
        const DB_URL = 'https://ips-source-pedidos-default-rtdb.firebaseio.com/';
        firebase.initializeApp({ databaseURL: DB_URL });
        const db = firebase.database();

        let cart = [];
        let total = 0;
        let restSlug = '';
        let whatsappNum = '';

        const slug = window.location.pathname.replace('/cardapio/', '').replace(/\/$/, '');
        if (!slug) { erroCardapio('URL inválida'); }

        db.ref('restaurants/' + slug).once('value').then(snap => {
            if (!snap.exists()) { erroCardapio('Restaurante não encontrado'); return; }
            const rest = snap.val();
            restSlug = slug;
            whatsappNum = rest.centralBotNumber || rest.whatsapp || '';
            document.getElementById('rest-title').textContent = '⚡ ' + (rest.nome || 'Cardápio');
            document.getElementById('rest-subtitle').textContent = 'Faça seu pedido pelo WhatsApp';
            document.title = 'Cardápio — ' + (rest.nome || '');
            carregarCardapio(slug);
        }).catch(e => erroCardapio('Erro ao carregar: ' + e.message));

        function carregarCardapio(slug) {
            db.ref('restaurants/' + slug + '/cardapio/categorias').on('value', snap => {
                const container = document.getElementById('menu-container');
                if (!snap.exists()) {
                    container.innerHTML = '<div class="error-card"><div class="icon">🍽️</div><p>Cardápio vazio</p></div>';
                    return;
                }
                let html = '';
                const cats = snap.val();
                const keys = Object.keys(cats).sort((a, b) => (cats[a].ordem || 999) - (cats[b].ordem || 999));
                keys.forEach(key => {
                    const cat = cats[key];
                    html += `<div class="categoria">${cat.nome}</div>`;
                    const itens = cat.itens || {};
                    Object.keys(itens).forEach(ik => {
                        const item = itens[ik];
                        const preco = Number(item.preco || 0);
                        html += `<div class="card">
                            <div class="card-info">
                                <h3>${item.nome}</h3>
                                <p class="preco">R$ ${preco.toFixed(2)}</p>
                                ${item.desc ? `<p class="desc">${item.desc}</p>` : ''}
                            </div>
                            <button class="btn-add" onclick="add('${item.nome.replace(/'/g, "\\'")}', ${preco})">+</button>
                        </div>`;
                    });
                });
                container.innerHTML = html;
            });
        }

        function erroCardapio(msg) {
            document.getElementById('menu-container').innerHTML = `<div class="error-card"><div class="icon">😕</div><p>${msg}</p></div>`;
        }

        function formatMoney(v) { return v.toFixed(2).replace('.', ','); }

        function showBadge() {
            const badge = document.getElementById('badge');
            badge.classList.add('show');
            setTimeout(() => badge.classList.remove('show'), 1200);
        }

        function add(nome, preco) {
            cart.push({ nome, preco });
            total += preco;
            showBadge();
            atualizarUI();
        }

        function remover(index) {
            total -= cart[index].preco;
            cart.splice(index, 1);
            atualizarUI();
        }

        function atualizarUI() {
            document.getElementById('total').innerText = formatMoney(total);
            const btn = document.getElementById('btn-finalizar');
            const section = document.getElementById('carrinho-section');
            const items = document.getElementById('carrinho-items');
            if (cart.length > 0) {
                btn.disabled = false;
                section.style.display = 'block';
                items.innerHTML = cart.map((item, i) =>
                    `<div class="item-carrinho">
                        <span>${item.nome}</span>
                        <span style="display:flex;align-items:center;">
                            R$ ${formatMoney(item.preco)}
                            <button class="remover" onclick="remover(${i})">✕</button>
                        </span>
                    </div>`
                ).join('');
            } else {
                btn.disabled = true;
                section.style.display = 'none';
            }
        }

        function checkout() {
            if (cart.length === 0 || !whatsappNum) return alert('Carrinho vazio ou WhatsApp não configurado');
            const itens = cart.map((item, i) => `${i + 1}. ${item.nome} — R$ ${formatMoney(item.preco)}`).join('%0A');
            const restNome = document.getElementById('rest-title').textContent.replace('⚡ ', '');
            const msg = `⚡ *NOVO PEDIDO*%0A📍 ${encodeURIComponent(restNome)}%0A🍽️ ${slug}%0A%0A${itens}%0A%0A💰 *Total: R$ ${formatMoney(total)}*`;
            const url = `https://wa.me/${whatsappNum.replace(/\D/g, '')}?text=${msg}`;
            window.open(url, '_blank');
            mostrarConfirmacao();
        }

        function mostrarConfirmacao() {
            document.body.innerHTML = `
                <div class="confirmacao">
                    <div class="confirmacao-box">
                        <div class="icon">✅</div>
                        <h1>Pedido Enviado!</h1>
                        <p>Abra o WhatsApp e envie a mensagem.</p>
                        <p style="color:#555;font-size:12px;">Aguarde a confirmação no chat.</p>
                        <button onclick="location.reload()">⚡ Novo Pedido</button>
                    </div>
                </div>`;
        }

        function detectarSlug() {
            const s = window.location.pathname.replace('/cardapio/', '').replace(/\/$/, '');
            if (!s) { erroCardapio('URL inválida'); }
        }
    </script>
</body>
</html>
