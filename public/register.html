<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Aceguá Byte</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 480px; width: 100%; padding: 20px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #00d4ff; font-size: 28px; }
        .logo p { color: #666; font-size: 14px; margin-top: 4px; }
        .card { background: #141414; border: 1px solid #222; border-radius: 16px; padding: 30px; }
        .card h2 { color: #fff; font-size: 20px; margin-bottom: 6px; }
        .card .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
        .campo { margin-bottom: 16px; }
        .campo label { display: block; font-size: 13px; color: #888; margin-bottom: 5px; font-weight: 600; }
        .campo input { width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .campo input:focus { border-color: #00d4ff; }
        .campo .hint { font-size: 11px; color: #555; margin-top: 4px; }
        .btn { width: 100%; padding: 14px; background: #00d4ff; color: #000; border: none; border-radius: 30px; font-weight: bold; font-size: 15px; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
        .btn:hover { background: #00a0cc; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .erro { background: rgba(231,76,60,0.15); color: #e74c3c; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .erro.show { display: block; }
        .sucesso { background: rgba(46,204,113,0.15); color: #2ecc71; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .sucesso.show { display: block; }
        .link { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .link a { color: #00d4ff; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        .slug-wrapper { display: flex; gap: 8px; }
        .slug-wrapper input { flex: 1; }
        .slug-preview { font-size: 12px; color: #555; margin-top: 4px; font-family: monospace; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .password-strength { height: 3px; background: #222; border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .password-strength .bar { height: 100%; transition: width 0.3s, background 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>⚡ Aceguá Byte</h1>
            <p>Sistema de Pedidos para Restaurantes</p>
        </div>
        <div class="card">
            <h2>Cadastrar Restaurante</h2>
            <p class="sub">Crie sua conta para gerenciar pedidos via WhatsApp</p>
            <div class="erro" id="erro"></div>
            <div class="sucesso" id="sucesso"></div>
            <form id="form-register" onsubmit="return cadastrar(event)">
                <div class="campo">
                    <label>Nome do Restaurante *</label>
                    <input type="text" id="nome" required placeholder="Ex: Lanchonete do João" autocomplete="off">
                </div>
                <div class="campo">
                    <label>Email *</label>
                    <input type="email" id="email" required placeholder="contato@restaurante.com">
                </div>
                <div class="campo">
                    <label>Slug (URL do seu cardápio) *</label>
                    <div class="slug-wrapper">
                        <input type="text" id="slug" required placeholder="lanchonete-do-joao" oninput="previewSlug()" autocomplete="off">
                    </div>
                    <div class="slug-preview" id="slug-preview">joinside.quest/cardapio/lanchonete-do-joao</div>
                </div>
                <div class="campo">
                    <label>Telefone *</label>
                    <input type="tel" id="telefone" required placeholder="Ex: 555399288344">
                </div>
                <div class="campo">
                    <label>WhatsApp do Restaurante *</label>
                    <input type="tel" id="whatsapp" required placeholder="Ex: 555399288344 (código país + número)">
                    <div class="hint">Número que receberá os pedidos</div>
                </div>
                <div class="campo">
                    <label>Endereço</label>
                    <input type="text" id="endereco" placeholder="Endereço do restaurante">
                </div>
                <div class="campo">
                    <label>Senha *</label>
                    <input type="password" id="senha" required minlength="6" placeholder="Mínimo 6 caracteres" oninput="passwordStrength(this.value)">
                    <div class="password-strength"><div class="bar" id="pw-bar" style="width:0%"></div></div>
                </div>
                <div class="campo">
                    <label>Confirmar Senha *</label>
                    <input type="password" id="senha2" required minlength="6" placeholder="Repita a senha">
                </div>
                <button type="submit" class="btn" id="btn-submit">Criar Conta</button>
            </form>
            <div class="link">Já tem conta? <a href="/login">Fazer Login</a></div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        firebase.initializeApp({ databaseURL: "https://ips-source-pedidos-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        function previewSlug() {
            const slug = document.getElementById('slug').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
            document.getElementById('slug').value = slug;
            document.getElementById('slug-preview').textContent = slug ? `joinside.quest/cardapio/${slug}` : '';
        }

        function passwordStrength(pw) {
            const bar = document.getElementById('pw-bar');
            const strength = Math.min(pw.length / 12, 1);
            bar.style.width = (strength * 100) + '%';
            bar.style.background = strength < 0.33 ? '#e74c3c' : strength < 0.66 ? '#f1c40f' : '#2ecc71';
        }

        async function hashSenha(senha) {
            const encoder = new TextEncoder();
            const data = encoder.encode(senha + '-aceguabyte-salt');
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function cadastrar(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const erro = document.getElementById('erro');
            const sucesso = document.getElementById('sucesso');
            erro.classList.remove('show');
            sucesso.classList.remove('show');

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const slug = document.getElementById('slug').value.trim().toLowerCase();
            const telefone = document.getElementById('telefone').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const endereco = document.getElementById('endereco').value.trim();
            const senha = document.getElementById('senha').value;
            const senha2 = document.getElementById('senha2').value;

            if (!slug) { showError('Slug é obrigatório'); return; }
            if (/[^a-z0-9-]/.test(slug) || slug.includes('.')) { showError('Slug inválido: use apenas letras, números e hífens'); return; }
            if (senha !== senha2) { showError('Senhas não conferem'); return; }
            if (senha.length < 6) { showError('Senha deve ter no mínimo 6 caracteres'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Criando conta...';

            try {
                const snap = await db.ref('restaurants/' + slug).once('value');
                if (snap.exists()) { showError('Este slug já está em uso. Escolha outro.'); btn.disabled = false; btn.textContent = 'Criar Conta'; return; }

                const emailSnap = await db.ref('restaurants').orderByChild('email').equalTo(email).once('value');
                if (emailSnap.exists()) { showError('Este email já está cadastrado'); btn.disabled = false; btn.textContent = 'Criar Conta'; return; }

                const senhaHash = await hashSenha(senha);

                const restaurant = {
                    nome, email, slug, telefone, whatsapp, endereco,
                    senha: senhaHash,
                    createdAt: new Date().toISOString(),
                    config: { cor: '#00d4ff' },
                    cardapio: {
                        categorias: {
                            pizza: { nome: 'Pizzas', ordem: 1, itens: {} },
                            hamburguer: { nome: 'Hambúrgueres', ordem: 2, itens: {} },
                            bebida: { nome: 'Bebidas', ordem: 3, itens: {} }
                        }
                    }
                };

                await db.ref('restaurants/' + slug).set(restaurant);

                const token = btoa(JSON.stringify({ slug, email, time: Date.now() }));
                localStorage.setItem('aceguabyte_token', token);
                localStorage.setItem('aceguabyte_restaurant', JSON.stringify({ slug, nome, email }));

                sucesso.textContent = 'Conta criada com sucesso! Redirecionando...';
                sucesso.classList.add('show');
                setTimeout(() => { window.location.href = '/dashboard/' + slug; }, 1000);

            } catch (err) {
                showError('Erro: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Criar Conta';
            }
        }

        function showError(msg) {
            const el = document.getElementById('erro');
            el.textContent = msg;
            el.classList.add('show');
        }
    </script>
</body>
</html>
